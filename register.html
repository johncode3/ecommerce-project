<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TechHub</title>
    <!-- <link rel="stylesheet" href="css/style.css"> -->
    <link rel="stylesheet" href="css/main.css">
    
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer" />
    </head>
<body>

    <header class="main-header">
        <div class="container">
            <a href="homepage.html"><img src="image/logo.avif" class="logo" alt="TechHub Logo"></a>
            <nav class="main-nav">
                <a href="homepage.html"><i class="fas fa-home"></i>Home</a>
                <a href="product.html"><i class="fas fa-shopping-bag"></i>Products</a>
                <a href="cart.html" class="cart-link"><i class="fas fa-shopping-cart"></i>Cart<span class="cart-count">0</span></a>
                <a href="login.html" class="active"><i class="fas fa-sign-in-alt"></i>Login</a>
            </nav>
        </div>
    </header>

    <main class="login">
        <form class="login-form">
            <img src="image/logo.avif" alt="logo" class="logo-form">
            <h2>Sign Up</h2>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="enter email" required>
            
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="enter username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="enter password" required>

            <label for="confirm-password">Confirm</label>
            <input type="password" id="confirm-password" name="password" placeholder="confirm password" required>

            <h4 class="login-with">Sign Up with</h4>
            
            <div class="social-icon">
                <i class="fab fa-facebook-f"></i> 
                <i class="fab fa-instagram"></i>
                <i class="fab fa-google"></i>
                <i class="fab fa-twitter"></i> </div>
            
            <button type="submit">Sign Up</button>
            
            <h3 class="signup">Already have account? <a href="login.html"> Login</a></h3>
        </form>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
